name: build-push-docker-image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: get-sharder
        run: |
          curl -s https://api.github.com/repos/deploymenttheory/go-jamf-guid-sharder/releases/latest \
          | grep "browser_download_url.*darwin_arm64" \
          | cut -d '"' -f 4 \
          | xargs curl -L | tar xz \
          rm LICENCE

      - name: registry-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/main:latest
            ghcr.io/${{ github.repository }}/main:${{ github.sha }}